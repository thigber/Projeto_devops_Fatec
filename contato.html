<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contato - Sistema DevOps</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }

        .container {
            max-width: 500px;
            margin: 80px auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #1e3c72;
            margin-bottom: 20px;
        }

        .info {
            margin-bottom: 25px;
            font-size: 15px;
            color: #555;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            font-size: 14px;
            color: #555;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            resize: none;
        }

        input:focus, textarea:focus {
            border-color: #2a5298;
        }

        textarea {
            height: 100px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #2a5298;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #1e3c72;
        }

        .link {
            margin-top: 20px;
        }

        .link a {
            text-decoration: none;
            color: #2a5298;
        }

        .link a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>📞 Contato</h1>

        <p class="info">
            Envie sua dúvida ou sugestão para nossa equipe.
        </p>

        <form>

            <div class="input-group">
                <label>Nome</label>
                <input type="text" placeholder="Digite seu nome">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Digite seu email">
            </div>

            <div class="input-group">
                <label>Mensagem</label>
                <textarea placeholder="Digite sua mensagem"></textarea>
            </div>

            <button type="submit">Enviar</button>

        </form>

        <div class="link">
            <a href="index.html">← Voltar para Home</a>
        </div>

    </div>

</body>
</html>
